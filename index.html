<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>𝕴𝖓𝖙𝖊𝖑𝖑𝖎𝖌𝖊𝖓𝖙 𝕮𝖔𝖒𝖕𝖎𝖑𝖊𝖗</title>
   
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-editor: #1e1e1e;
            --accent-primary: #3b82f6;
            --accent-secondary: #10b981;
            --accent-ai: #8b5cf6;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { box-sizing: border-box; outline: none; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main);
            margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header {
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-text {
            font-family: 'Fira Code', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            line-height: 1.2;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-ai));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-text small {
            font-size: 0.7rem;
            display: block;
            color: var(--text-muted);
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }
        h2 { 
            margin: 0; font-size: 1.35rem; font-weight: 700; 
            display: none;
        }
        .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
       
        .select-wrapper { position: relative; }
        .select-wrapper i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--accent-primary); z-index: 10; pointer-events: none; }
        select {
            appearance: none; background: var(--bg-panel); color: white; border: 1px solid var(--border);
            padding: 10px 15px 10px 35px; border-radius: 8px; cursor: pointer;
        }
        button {
            border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: 0.2s;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-run { background: var(--accent-secondary); color: #064e3b; }
        .btn-run:hover:not(:disabled) { background: #34d399; }
       
        .btn-ai-trigger { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
        .btn-ai-trigger:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

        #header-fix-btn {
            background: #10b981; color: #022c22; padding: 5px 15px; border-radius: 6px; font-size: 0.8rem;
            display: none; animation: fadeIn 0.3s ease; margin-left: auto;
        }
        #header-fix-btn:hover:not(:disabled) { background: #34d399; }

        #view-new-tab-btn, #copy-output-btn, #download-code-btn {
            background: #64748b; color: white; padding: 10px 18px; font-size: 0.9rem;
        }
        #view-new-tab-btn:hover:not(:disabled), #copy-output-btn:hover:not(:disabled), #download-code-btn:hover:not(:disabled) { 
            background: #475569; 
        }
        #download-code-btn {
            background: var(--accent-primary);
        }
        #download-code-btn:hover:not(:disabled) { background: #2563eb; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .main-container {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            gap: 15px; flex: 1; min-height: 0;
        }
        .panel {
            background: var(--bg-panel); border-radius: 12px; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .panel-header {
            background: rgba(0,0,0,0.2); padding: 8px 15px; font-size: 0.85rem; font-weight: 600;
            color: var(--text-muted); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px; justify-content: space-between;
        }
        .editor-area { grid-column: 1 / -1; grid-row: 1; background: var(--bg-editor); }
        .terminal-area { grid-column: 1; grid-row: 2; background: black; }
        .ai-area { grid-column: 2; grid-row: 2; border: 1px solid var(--accent-ai); }
        #monaco-container { width: 100%; height: 100%; }
        #terminal { flex: 1; width: 100%; height: 100%; padding: 10px; overflow: hidden; }
        div#ai-out {
            flex: 1; padding: 15px; margin: 0; overflow-y: auto;
            font-family: 'Inter', sans-serif; color: #c4b5fd; line-height: 1.6; background: #13111c;
        }
        #ai-out code { background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; font-family: 'Fira Code'; color: #fff; }
        #ai-out pre { background: #0b0b11; padding: 10px; border-radius: 8px; border: 1px solid #333; overflow-x: auto; }
        #preview { width: 100%; height: 100%; background: white; border: none; display: none; }
        
        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
            }
            .editor-area { grid-column: 1; grid-row: 1; min-height: 300px; }
            .terminal-area { grid-column: 1; grid-row: 2; min-height: 200px; }
            .ai-area { grid-column: 1; grid-row: 3; min-height: 200px; }
            header { flex-direction: column; align-items: stretch; }
            .toolbar { justify-content: center; }
        }
        
        .loading-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <div class="logo-text">
                INTELLIGENT<br>
                <small>COMPILER</small>
            </div>
        </div>
        
        <div class="toolbar">
            <div class="select-wrapper">
                <i class="fa-solid fa-code"></i>
                <select id="lang" onchange="changeLanguage()">
                    <option value="python">Python</option>
                    <option value="c">C</option>
                    <option value="cpp">C++</option>
                    <option value="java">Java</option>
                    <option value="js">JavaScript</option>

            </div>
            <button class="btn-run" onclick="runCode()" id="run-btn">
                <i class="fa-solid fa-play"></i> Run Code
            </button>
            <button class="btn-ai-trigger" onclick="askAI()" id="ai-btn">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Get Suggestions
            </button>
            <button id="download-code-btn" onclick="downloadCode()">
                <i class="fa-solid fa-download"></i> Download Code
            </button>
        </div>
    </header>

    <div class="main-container">
        <div class="panel editor-area">
            <div class="panel-header"><span><i class="fa-regular fa-file-code"></i> Editor</span></div>
            <div id="monaco-container"></div>
        </div>
       
        <div class="panel terminal-area">
            <div class="panel-header">
                <span><i class="fa-solid fa-desktop"></i> Terminal Output</span>
                <div style="display: flex; gap: 8px;">
                    <button id="copy-output-btn" onclick="copyOutput()">
                        <i class="fa-solid fa-copy"></i> Copy Output
                    </button>
                    <button id="view-new-tab-btn" onclick="viewInNewTab()">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> View in New Tab
                    </button>
                </div>
            </div>
            <div style="flex: 1; position: relative; overflow: hidden; display:flex; flex-direction:column;">
                <div id="terminal"></div>
                <iframe id="preview"></iframe>
            </div>
        </div>
       
        <div class="panel ai-area">
            <div class="panel-header" style="background: linear-gradient(90deg, rgba(139,92,246,0.1), transparent);">
                <span style="color: #c4b5fd;"><i class="fa-solid fa-robot"></i> Assistant</span>
                <button id="header-fix-btn" onclick="applyFix()">
                    <i class="fa-solid fa-check-double"></i> Apply Fix
                </button>
            </div>
            <div id="ai-out">
                <p style="opacity: 0.5; margin-top: 20px; text-align: center;">
                    <i class="fa-solid fa-robot fa-2x"></i><br><br>
                    Click <b>"Get Suggestions"</b><br>to analyze your code.
                </p>
            </div>
        </div>
    </div>

    <script>
        
        const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocalhost 
            ? 'http://localhost:5000' 
            : 'https://intelligentcompiler.onrender.com';
        
        
        let ws = null;
        let editor = null;
        let term = null;
        let fitAddon = null;
        let pendingAiFix = "";
        let outputBuffer = "";
        let inputBuffer = "";
        
        // 𐌁Ꝋ𐌉𐌋𐌄𐌓𐌐𐌋𐌀𐌕𐌄 𐌕𐌄𐌌𐌐𐌋𐌀𐌕𐌄𐌔
const boilerplate = {
    python: `print("=" * 50)
print("👨‍💻 Developer: JOKER53 (KADHIRAVAN EG)")
print("📚 Cyber Security Student")
print("💻 Building Intelligent Compiler")
print("=" * 50)
print()
name = input("Enter your name: ")
print(f"Hello, {name}!")`,

    c: `#include <stdio.h>

int main() {
    printf("==================================================\\n");
    printf("👨‍💻 Developer: JOKER53 (KADHIRAVAN EG)\\n");
    printf("📚 Cyber Security Student\\n");
    printf("💻 Building Intelligent Compiler\\n");
    printf("==================================================\\n\\n");
    
    char name[50];
    printf("Enter name: ");
    scanf("%s", name);
    printf("Hello, %s!\\n", name);
    return 0;
}`,

    cpp: `#include <iostream>
#include <string>
using namespace std;

int main() {
    cout << "==================================================" << endl;
    cout << "👨‍💻 Developer: JOKER53 (KADHIRAVAN EG)" << endl;
    cout << "📚 Cyber Security Student" << endl;
    cout << "💻 Building Intelligent Compiler" << endl;
    cout << "==================================================" << endl << endl;
    
    string name;
    cout << "Enter name: ";
    cin >> name;
    cout << "Hello, " << name << "!" << endl;
    return 0;
}`,

    java: `import java.util.Scanner;

public class Main {
    public static void main(String[] args) {
        System.out.println("==================================================");
        System.out.println("👨‍💻 Developer: JOKER53 (KADHIRAVAN EG)");
        System.out.println("📚 Cyber Security Student");
        System.out.println("💻 Building Intelligent Compiler");
        System.out.println("==================================================");
        System.out.println();
        
        Scanner s = new Scanner(System.in);
        System.out.print("Enter name: ");
        String name = s.nextLine();
        System.out.println("Hello " + name + "!");
    }
}`,

    js: `console.log("==================================================");
console.log("👨‍💻 Developer: JOKER53 (KADHIRAVAN EG)");
console.log("📚 Cyber Security Student");
console.log("💻 Building Intelligent Compiler");
console.log("==================================================");
console.log();

console.log("Hello from JavaScript!");
console.log("Try adding more JavaScript code here");`,

    html: `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Intelligent Compiler</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }
        .developer { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 15px; border-radius: 10px; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="developer">
        <h2>👨‍💻 Developer: JOKER53 (KADHIRAVAN EG)</h2>
        <p>📚 Cyber Security Student | 💻 Building Intelligent Compiler</p>
    </div>
    <h1>Hello HTML</h1>
    <p>This is your HTML preview</p>
</body>
</html>`

        // 𝕀𝕟𝕚𝕥𝕚𝕒𝕝𝕚𝕫𝕖 𝕋𝕙𝕖 𝕄𝕠𝕟𝕒𝕔𝕠 𝔼𝕕𝕚𝕥𝕠𝕣
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
       
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-container'), {
                value: boilerplate.python,
                language: 'python',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                wordWrap: 'on'
            });
            
            //█▓▒▒░░░ SAVE LOCAL STORAGE░░░▒▒▓█
            editor.onDidChangeModelContent(() => {
                saveCodeToLocalStorage();
            });
        });

     // ʟօƈǟʟ ֆȶօʀǟɢɛ
        function saveCodeToLocalStorage() {
            if (editor) {
                const lang = document.getElementById("lang").value;
                localStorage.setItem(`code_${lang}`, editor.getValue());
            }
        }
        
        function loadCodeFromLocalStorage() {
            if (editor) {
                const lang = document.getElementById("lang").value;
                const savedCode = localStorage.getItem(`code_${lang}`);
                if (savedCode) {
                    editor.setValue(savedCode);
                } else {
                    editor.setValue(boilerplate[lang]);
                }
            }
        }

     
        window.onload = function() {
            term = new Terminal({
                cursorBlink: true,
                theme: { background: '#000000', foreground: '#4ade80', cursor: '#ffffff' },
                fontSize: 14,
                fontFamily: "'Fira Code', monospace",
                convertEol: true,
                scrollback: 1000
            });
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal'));
            fitAddon.fit();
            term.writeln("\x1b[2m═══════════════════════════════════════════\x1b[0m");
            term.writeln("\x1b[2m  𝙄𝙣𝙩𝙚𝙡𝙡𝙞𝙜𝙚𝙣𝙩 𝘾𝙤𝙢𝙥𝙞𝙡𝙚𝙧 𝙏𝙚𝙧𝙢𝙞𝙣𝙖𝙡 𝙍𝙚𝙖𝙙𝙮\x1b[0m");
            term.writeln("\x1b[2m═══════════════════════════════════════════\x1b[0m");
            term.writeln("");
           
            window.addEventListener('resize', () => {
                if (fitAddon) fitAddon.fit();
            });

            term.onData(e => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                switch (e) {
                    case '\r':
                        term.write('\r\n');
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ stdin: inputBuffer }));
                        }
                        outputBuffer += inputBuffer + "\n";
                        inputBuffer = "";
                        break;
                    case '\u007F': // Backspace <-
                        if (inputBuffer.length > 0) {
                            inputBuffer = inputBuffer.slice(0, -1);
                            term.write('\b \b');
                        }
                        break;
                    case '\u0003': // Ctrl+C
                        term.write('^C\r\n');
                        inputBuffer = "";
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ stdin: "__INTERRUPT__" }));
                        }
                        break;
                    default:
                        if (e >= ' ' && e <= '~') {
                            inputBuffer += e;
                            term.write(e);
                        }
                }
            });

            loadCodeFromLocalStorage();
            updateNewTabButton();
        };

        function changeLanguage() {
            const lang = document.getElementById("lang").value;
            const monacoLangMap = {
                "python": "python", "c": "c", "cpp": "cpp",
                "java": "java", "js": "javascript", "html": "html"
            };
           
            if (editor) {
                monaco.editor.setModelLanguage(editor.getModel(), monacoLangMap[lang]);
                loadCodeFromLocalStorage();
            }
            updateNewTabButton();
        }

        function updateNewTabButton() {
            const lang = document.getElementById("lang").value;
            const btn = document.getElementById("view-new-tab-btn");
            if (btn) {
                btn.style.display = (lang === "html") ? "flex" : "none";
            }
        }

        function runCode() {
            const runBtn = document.getElementById("run-btn");
            const terminalDiv = document.getElementById("terminal");
            const preview = document.getElementById("preview");
            const fixBtn = document.getElementById("header-fix-btn");
           
            const code = editor.getValue();
            const lang = document.getElementById("lang").value;
            
            fixBtn.style.display = "none";
            pendingAiFix = "";
            outputBuffer = "";
            inputBuffer = "";
            
            if (term && !term._isOpen) {
                term.clear();
            } else if (term) {
                term.clear();
            }

            // 𝙵𝙾𝚁 𝙷𝚃𝙼𝙻 
            if (lang === "html") {
                terminalDiv.style.display = "none";
                preview.style.display = "block";
                preview.srcdoc = code;
                return;
            }
            
            terminalDiv.style.display = "block";
            preview.style.display = "none";
            
            // Cₗₒₛₑ ₑₓᵢₛₜᵢₙg cₒₙₙₑcₜᵢₒₙ
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
            }
            
            runBtn.disabled = true;
            runBtn.innerHTML = '<i class="fa-solid fa-spinner spinner"></i> Running...';
            
            const wsUrl = isLocalhost 
                ? `ws://localhost:5000/ws`
                : `wss://intelligentcompiler.onrender.com/ws`;
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    ws.send(JSON.stringify({ lang, code }));
                    if (fitAddon) fitAddon.fit();
                    runBtn.disabled = false;
                    runBtn.innerHTML = '<i class="fa-solid fa-play"></i> Run Code';
                };
               
                ws.onmessage = (e) => {
                    outputBuffer += e.data;
                    term.write(e.data);
                };
               
                ws.onerror = () => { 
                    runBtn.disabled = false;
                    runBtn.innerHTML = '<i class="fa-solid fa-play"></i> Run Code';
                };
                
                ws.onclose = () => {
                    runBtn.disabled = false;
                    runBtn.innerHTML = '<i class="fa-solid fa-play"></i> Run Code';
                };
            } catch (err) {
                runBtn.disabled = false;
                runBtn.innerHTML = '<i class="fa-solid fa-play"></i> Run Code';
            }
        }

        async function askAI() {
            const aiOut = document.getElementById("ai-out");
            const fixBtn = document.getElementById("header-fix-btn");
            const aiBtn = document.getElementById("ai-btn");
            const code = editor.getValue();
            const lang = document.getElementById("lang").value;
            const output = outputBuffer || "No output generated";

            aiBtn.disabled = true;
            aiBtn.innerHTML = '<i class="fa-solid fa-spinner spinner"></i> Analyzing...';
            
            aiOut.innerHTML = `
                <div style="text-align:center; margin-top:40px; color: #c4b5fd;">
                    <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
                    <p style="margin-top:10px;">Analyzing your code with AI...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code, lang, output })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                let aiText = data.suggestion || data.message || "No suggestion available";
                
                // ̷E̷̷x̷̷t̷̷r̷a̷̷c̷̷t̷ ̷c̷̷o̷̷d̷̷e̷ ̷f̷̷i̷̷x̷ ̷f̷̷r̷̷o̷̷m̷ ̷m̷a̷̷r̷̷k̷̷d̷̷o̷̷w̷̷n̷
                const codeBlockRegex = /```(?:\w+)?\n([\s\S]*?)```/g;
                const matches = [...aiText.matchAll(codeBlockRegex)];
               
                if (matches.length > 0 && matches[0][1]) {
                    pendingAiFix = matches[0][1].trim();
                    fixBtn.style.display = "block";
                    fixBtn.innerHTML = `<i class="fa-solid fa-check-double"></i> Apply Fix (${matches.length} suggestion${matches.length > 1 ? 's' : ''})`;
                    fixBtn.style.background = "#10b981";
                } else {
                    pendingAiFix = "";
                }
                
                // ̶S̶̶a̶̶n̶̶i̶̶t̶̶i̶̶z̶̶e̶ ̶a̶̶n̶̶d̶ ̶r̶̶e̶̶n̶̶d̶̶e̶̶r̶ ̶m̶̶a̶̶r̶̶k̶̶d̶̶o̶̶w̶̶n̶
                const cleanHtml = DOMPurify.sanitize(marked.parse(aiText));
                aiOut.innerHTML = cleanHtml;
                
            } catch (err) {
                aiOut.innerHTML = `
                    <div style="color:#f87171; text-align:center; padding:20px;">
                        <i class="fa-solid fa-exclamation-triangle fa-2x"></i>
                        <p style="margin-top:10px;"><strong>Error analyzing code</strong></p>
                        <p style="font-size:0.9rem;">${err.message}</p>
                    </div>
                `;
            } finally {
                aiBtn.disabled = false;
                aiBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> Get Suggestions';
            }
        }

        function applyFix() {
            if (pendingAiFix && editor) {
                editor.setValue(pendingAiFix);
                const fixBtn = document.getElementById("header-fix-btn");
                const originalText = fixBtn.innerHTML;
                fixBtn.innerHTML = `<i class="fa-solid fa-check"></i> Applied!`;
                fixBtn.style.background = "#3b82f6";
                setTimeout(() => { 
                    fixBtn.style.display = "none";
                    fixBtn.innerHTML = originalText;
                }, 2000);
                saveCodeToLocalStorage();
            }
        }

        function downloadCode() {
            const code = editor.getValue();
            const lang = document.getElementById("lang").value;
            const extensions = { 
                python: "py", c: "c", cpp: "cpp", 
                java: "java", js: "js", html: "html" 
            };
            const ext = extensions[lang] || "txt";
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `code.${ext}`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyOutput() {
            if (!outputBuffer.trim()) {
                return;
            }
            navigator.clipboard.writeText(outputBuffer);
        }

        function viewInNewTab() {
            const code = editor.getValue();
            if (!code.trim()) {
                return;
            }
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
    </script>
</body>
</html>
